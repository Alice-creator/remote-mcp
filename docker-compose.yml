services:
  gateway:
    build: .
    command: python run_gateway.py
    ports:
      - "${GATEWAY_PORT:-8000}:${GATEWAY_PORT:-8000}"
    env_file:
      - .env
    volumes:
      - ./workspace:/app/workspace
    restart: unless-stopped

  worker:
    build: .
    command: python run_worker.py
    ports:
      - "${MCP_PORT:-8001}:${MCP_PORT:-8001}"
    env_file:
      - .env
    volumes:
      - ./workspace:/app/workspace
    restart: unless-stopped
    depends_on:
      - gateway
