services:
  gateway:
    build: .
    command: python run_gateway.py
    ports:
      - "${GATEWAY_PORT:-8000}:${GATEWAY_PORT:-8000}"
    env_file: [.env]
    volumes:
      - ./workspace:/app/workspace
    restart: unless-stopped

  mock-lights:
    build: .
    command: uvicorn mocks.lights:app --host 0.0.0.0 --port 9001
    ports:
      - "9001:9001"
    restart: unless-stopped

  mock-thermostat:
    build: .
    command: uvicorn mocks.thermostat:app --host 0.0.0.0 --port 9002
    ports:
      - "9002:9002"
    restart: unless-stopped
